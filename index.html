<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CultivaTech — Portail Microfinance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root{
    --blue:#1B4F72;--blue2:#2E86C1;--blue-pale:#D4E6F1;--blue-bg:#F4F8FB;
    --side:#0E2233;--side-hover:#193448;--side-text:#9BB4C7;
    --or:#C8A84B;--bg:#F3F6F9;--card:#FFFFFF;
    --border:#E2E8ED;--text:#17232E;--muted:#647687;
    --red:#C0392B;--amber:#D68910;--green:#1E8449;--purple:#7D3C98;
    --shadow:0 1px 2px rgba(23,35,46,.05),0 1px 3px rgba(23,35,46,.04);
    --shadow-lg:0 4px 16px rgba(23,35,46,.09);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  .icon{width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px}
  /* LOGIN */
  #loginScreen{position:fixed;inset:0;z-index:1000;background:linear-gradient(150deg,#08151F 0%,#0E2233 45%,#123859 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .login-orbs{position:absolute;inset:0;pointer-events:none}
  .login-orbs::before{content:'';position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(46,134,193,.10) 0%,transparent 70%);top:-80px;right:-80px}
  .login-orbs::after{content:'';position:absolute;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,75,.06) 0%,transparent 70%);bottom:-60px;left:-60px}
  .login-card{position:relative;background:rgba(255,255,255,.05);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:48px 44px;width:410px;text-align:center;box-shadow:0 20px 64px rgba(0,0,0,.45)}
  .login-logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
  .login-logo{font-family:'Playfair Display',serif;font-size:26px;color:#fff;letter-spacing:-.5px}
  .login-leaf{font-size:26px}
  .login-sub{color:rgba(255,255,255,.4);font-size:12px;letter-spacing:.3px;margin-bottom:8px}
  .login-divider{width:36px;height:1px;background:rgba(46,134,193,.5);margin:14px auto 18px}
  .login-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(46,134,193,.16);border:1px solid rgba(46,134,193,.32);color:rgba(150,200,235,.95);font-size:11px;font-weight:600;padding:6px 16px;border-radius:18px;margin-bottom:26px;letter-spacing:.7px;text-transform:uppercase}
  .login-label{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;text-align:left}
  .login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;transition:all .2s}
  .login-input::placeholder{color:rgba(255,255,255,.28)}
  .login-input:focus{border-color:rgba(46,134,193,.6);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(46,134,193,.1)}
  .login-btn{width:100%;background:#2E86C1;border:none;border-radius:10px;padding:14px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:4px;letter-spacing:.2px}
  .login-btn:hover{background:#2874A6}
  .login-btn:disabled{opacity:.5;cursor:not-allowed}
  .login-error{color:#ff8a80;font-size:12px;margin-top:10px;min-height:18px}
  /* LAYOUT SIDEBAR + MAIN */
  #app{display:none;min-height:100vh}
  #app.on{display:flex}
  .sidebar{width:224px;min-width:224px;background:var(--side);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side-logo{display:flex;align-items:center;gap:9px;padding:22px 20px 18px;color:#fff}
  .side-logo .lg-name{font-family:'Playfair Display',serif;font-size:17px;letter-spacing:-.2px}
  .side-logo .lg-tag{display:block;font-size:9.5px;color:var(--side-text);letter-spacing:.9px;text-transform:uppercase;margin-top:1px}
  .side-sep{height:1px;background:rgba(255,255,255,.07);margin:0 16px 10px}
  .tab-bar{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1}
  .tab-btn{display:flex;align-items:center;gap:11px;background:none;border:none;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:500;color:var(--side-text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s,color .15s;text-align:left;white-space:nowrap}
  .tab-btn .icon{width:16px;height:16px;opacity:.85}
  .tab-btn:hover{background:var(--side-hover);color:#fff}
  .tab-btn.active{background:#2E86C1;color:#fff;font-weight:600}
  .side-user{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.07)}
  .side-user .su-name{color:#fff;font-size:12.5px;font-weight:600;margin-bottom:2px}
  .side-user .su-org{color:var(--side-text);font-size:11px;margin-bottom:10px}
  .side-user button{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:7px;color:var(--side-text);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
  .side-user button:hover{background:rgba(192,57,43,.18);border-color:rgba(192,57,43,.4);color:#ffb3ab}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);min-height:56px;padding:8px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .topbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .topbar-role{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .badge-mfi{background:#EAF2F8;color:var(--blue);border:1px solid #C4DCEC}
  .topbar-name{font-size:13px;color:var(--muted);font-weight:500}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .topbar-region{font-size:12px;color:var(--muted);background:var(--blue-bg);border:1px solid var(--border);padding:5px 11px;border-radius:16px;font-weight:500}
  .refresh-btn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .refresh-btn:hover{border-color:var(--blue2);color:var(--blue)}
  .logout-btn{display:none}
  .content{padding:26px 28px 40px;max-width:1420px;width:100%;margin:0 auto}
  .page-header{margin-bottom:20px}
  .section-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:3px}
  .section-sub{font-size:12.5px;color:var(--muted)}
  .subsection-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
  .subsection-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:22px}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;position:relative}
  .kpi-icon{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;background:var(--blue-bg);color:var(--blue2);display:flex;align-items:center;justify-content:center;font-size:15px}
  .kpi-card.kpi-green .kpi-icon{background:#E8F6EE;color:var(--green)}
  .kpi-card.kpi-amber .kpi-icon{background:#FCF4E6;color:var(--amber)}
  .kpi-card.kpi-red   .kpi-icon{background:#FBEDEB;color:var(--red)}
  .kpi-card.kpi-purple .kpi-icon{background:#F5EDF8;color:var(--purple)}
  .kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding-right:36px;line-height:1.35;order:-1}
  .kpi-value{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1.1;font-variant-numeric:tabular-nums}
  .kpi-card.kpi-green .kpi-value{color:var(--green)}
  .kpi-card.kpi-amber .kpi-value{color:var(--amber)}
  .kpi-card.kpi-red .kpi-value{color:var(--red)}
  .kpi-delta{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;width:fit-content;padding:2px 8px;border-radius:10px}
  .kpi-delta.up{background:#E8F6EE;color:#1B7A2E}
  .kpi-delta.down{background:#FBEDEB;color:var(--red)}
  .kpi-delta.flat{background:#F1F3F5;color:var(--muted)}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
  .charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;box-shadow:var(--shadow)}
  .chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:7px}
  .chart-wrap{position:relative;height:250px}
  .alerte-strip{background:#FDF1EF;border:1px solid #F5D5D0;border-radius:10px;padding:13px 16px;display:flex;align-items:flex-start;gap:11px;margin-bottom:18px}
  .alerte-strip .alerte-icon{font-size:18px;flex-shrink:0;margin-top:1px;color:var(--red)}
  .alerte-strip .alerte-title{font-weight:600;color:var(--red);font-size:13px;margin-bottom:2px}
  .alerte-strip .alerte-desc{font-size:12px;color:#8E3B31}
  .info-banner{background:var(--blue-bg);border:1px solid var(--blue-pale);border-radius:10px;padding:12px 16px;font-size:12.5px;color:var(--blue);display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .warn-banner{background:#FCF7E8;border:1px solid #F0E2B6;border-radius:10px;padding:12px 16px;font-size:12.5px;color:#7D6608;display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .table-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
  .table-head{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
  .table-title{font-size:13.5px;font-weight:600;color:var(--text)}
  .table-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .search-input{border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);width:190px;transition:all .15s;background:#FAFBFC}
  .search-input:focus{border-color:var(--blue2);background:#fff}
  .filter-select{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);background:#FAFBFC;cursor:pointer}
  .filter-select:focus{border-color:var(--blue2)}
  table{width:100%;border-collapse:collapse}
  th{background:#FAFBFC;padding:9px 16px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border)}
  td{padding:11px 16px;font-size:13px;border-top:1px solid #F0F3F5}
  tr:hover td{background:#FAFCFD}
  .table-foot{padding:11px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:#FAFBFC}
  .table-info{font-size:12px;color:var(--muted)}
  .pagination{display:flex;gap:4px}
  .page-btn{border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;background:#fff;font-family:'DM Sans',sans-serif;color:var(--text);transition:all .12s}
  .page-btn.active{background:var(--blue2);color:#fff;border-color:var(--blue2);font-weight:600}
  .page-btn:hover:not(.active){border-color:var(--blue2);color:var(--blue)}
  .page-btn:disabled{cursor:default;opacity:.4}
  .badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.2px}
  .b-green{background:#E8F6EE;color:#1B5E20}
  .b-amber{background:#FCF4E6;color:#B35B00}
  .b-red{background:#FBEDEB;color:#A93226}
  .b-blue{background:#EAF2F8;color:#1B4F72}
  .b-gray{background:#F1F3F5;color:#4A5866}
  .b-purple{background:#F5EDF8;color:#4A148C}
  .score-row{display:flex;align-items:center;gap:8px}
  .score-bar{height:6px;border-radius:3px;background:#EDF1F4;flex:1;overflow:hidden}
  .score-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .score-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);min-width:34px;text-align:right}
  .loading{text-align:center;padding:80px;color:var(--muted)}
  .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:60px;color:var(--muted)}
  .empty-icon{font-size:38px;margin-bottom:12px}
  .btn-outline{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text);font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
  .btn-outline:hover{border-color:var(--blue2);color:var(--blue);background:var(--blue-bg)}
  /* RAPPORT PDF (impression) */
  #reportView{display:none}
  @media print{
    #app,#loginScreen{display:none!important}
    #reportView{display:block!important;font-family:'DM Sans',Arial,sans-serif;color:#17232E;padding:0 8mm}
    #reportView h1{font-size:22pt;color:#1B4F72;margin-bottom:2mm}
    #reportView h2{font-size:13pt;color:#1B4F72;margin:8mm 0 3mm;border-bottom:1.5pt solid #2E86C1;padding-bottom:1.5mm}
    #reportView .r-sub{color:#647687;font-size:10pt;margin-bottom:1mm}
    #reportView table{width:100%;border-collapse:collapse;font-size:9.5pt;margin-bottom:4mm}
    #reportView th{background:#EAF2F8;color:#1B4F72;text-align:left;padding:2mm 3mm;border:0.5pt solid #D4E6F1}
    #reportView td{padding:2mm 3mm;border:0.5pt solid #E5E8E8}
    #reportView .r-kpis{display:flex;flex-wrap:wrap;gap:4mm;margin:4mm 0}
    #reportView .r-kpi{border:0.75pt solid #D4E6F1;border-radius:2mm;padding:3mm 5mm;min-width:32mm}
    #reportView .r-kpi b{display:block;font-size:16pt;color:#1B4F72}
    #reportView .r-kpi span{font-size:8.5pt;color:#647687}
    #reportView .r-foot{margin-top:8mm;padding-top:3mm;border-top:0.75pt solid #D4E6F1;font-size:8.5pt;color:#647687;text-align:center}
  }
  @media(max-width:980px){
    #app.on{flex-direction:column}
    .sidebar{width:100%;min-width:0;height:auto;position:static;flex-direction:row;align-items:center;overflow-x:auto}
    .side-logo{padding:12px 16px}.side-sep{display:none}
    .tab-bar{flex-direction:row;padding:8px 10px}
    .side-user{border-top:none;padding:8px 12px;white-space:nowrap}
    .side-user .su-name,.side-user .su-org{display:none}
    .charts-grid,.charts-grid-3{grid-template-columns:1fr}
  }
  @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.topbar{padding:8px 14px}}

  /* ── SIMULATEUR DE CRÉDIT ─────────────────────────────────────────── */
  .conf-banner{background:var(--blue-bg);border:1px solid var(--blue-pale);border-radius:10px;padding:12px 16px;font-size:12.5px;color:var(--blue);display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .rate-panel-toggle{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--blue);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-bottom:12px}
  .rate-panel-toggle:hover{border-color:var(--blue2)}
  .rate-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0F3F5}
  .rate-name{flex:1;font-size:12.5px;color:var(--text);font-weight:500}
  .rate-input{width:90px;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;font-family:'DM Mono',monospace;text-align:right;color:var(--text);outline:none;background:#FAFBFC}
  .rate-input:focus{border-color:var(--blue2);background:#fff}
  .rate-unit{font-size:12px;color:var(--muted);min-width:34px}
  .rate-cap{font-size:11px;color:var(--muted);margin-top:6px}
  .sim-montant{font-size:26px;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .sim-mensualite{font-size:26px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-orbs"></div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <span class="login-leaf">&#127807;</span>
      <span class="login-logo">CultivaTech</span>
    </div>
    <div class="login-sub">Agriculture intelligente au Burkina Faso</div>
    <div class="login-divider"></div>
    <div class="login-badge">&#127981; Portail Microfinance</div>
    <div class="login-label">Vos identifiants</div>
    <input class="login-input" id="username" type="text" placeholder="Identifiant" autocomplete="username">
    <input class="login-input" id="password" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="side-logo"><span style="font-size:21px">&#127807;</span><div><span class="lg-name">CultivaTech</span><span class="lg-tag">Portail Microfinance</span></div></div>
    <div class="side-sep"></div>
    <nav class="tab-bar" id="tabBar"></nav>
    <div class="side-user"><div class="su-name" id="topbarName"></div><div class="su-org" id="sideOrg"></div><button onclick="logout()">D&#233;connexion</button></div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="topbar-left"><span class="topbar-role badge-mfi">Microfinance</span><span id="topbarRegion" class="topbar-region"></span></div>
      <div class="topbar-right">
        <button class="refresh-btn" onclick="generateReport()">Rapport PDF</button>
        <button class="refresh-btn" onclick="exportCSV()">CSV</button>
        <button class="refresh-btn" onclick="fetchAndRender()">&#8635;</button>
      </div>
    </header>
    <main class="content" id="mainContent"><div class="loading"><div class="spinner"></div><div>Chargement&#8230;</div></div></main>
  </div>
</div>
</div>

<script>
var FUNCTIONS_URL = 'https://vyqhzagajlbosikzfnit.supabase.co/functions/v1'
var TOKEN        = sessionStorage.getItem('mfi_token')
var USER         = JSON.parse(sessionStorage.getItem('mfi_user') || 'null')
var DATA         = null
var CHARTS       = {}
var currentTab   = null
var filteredRows = []
var currentPage  = 1
var PAGE_SIZE    = 15

var TAB_META = {
  overview:   {icon:'chart',   label:"Vue d'ensemble"},
  credit:     {icon:'sprout',  label:'Cr\xe9dit agricole'},
  risque:     {icon:'shield',  label:'Risque portefeuille'},
  simulateur: {icon:'calc',    label:'Simulateur cr\xe9dit'}
}
var MFI_TABS = ['overview','credit','risque','simulateur']

// ════ ICÔNES SVG + utilitaires (design premium) ═══════════════════════════════
var SVGI = {

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  var username = document.getElementById('username').value.trim()
  var password = document.getElementById('password').value
  var errEl    = document.getElementById('loginError')
  errEl.textContent = ''
  if (!username || !password) { errEl.textContent = 'Identifiant et mot de passe requis.'; return }
  var btn = document.getElementById('loginBtn')
  btn.textContent = 'Connexion…'; btn.disabled = true
  try {
    var res  = await fetch(FUNCTIONS_URL + '/partner-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:username,password:password,role:'microfinance'}) })
    var data = await res.json()
    if (!res.ok) { errEl.textContent = data.error || 'Identifiants incorrects.'; btn.textContent = 'Se connecter'; btn.disabled = false; return }
    TOKEN = data.token; USER = data.user
    sessionStorage.setItem('mfi_token', TOKEN)
    sessionStorage.setItem('mfi_user', JSON.stringify(USER))
    showApp(); await fetchAndRender()
  } catch (_) { errEl.textContent = 'Erreur r\xe9seau.'; btn.textContent = 'Se connecter'; btn.disabled = false }
}

document.getElementById('username').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('password').focus() })
document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin() })

// ── APP ───────────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('app').classList.add('on')
  document.getElementById('topbarName').textContent = USER.name || ''
  document.getElementById('sideOrg').textContent = USER.organization || 'Microfinance partenaire'
  document.getElementById('topbarRegion').textContent = USER.region || 'National'
  buildTabBar()
}

function buildTabBar() {
  var bar = document.getElementById('tabBar'); bar.innerHTML = ''
  MFI_TABS.forEach(function(t, i) {
    var btn = document.createElement('button')
    btn.className = 'tab-btn' + (i===0?' active':'')
    btn.dataset.tab = t
    btn.onclick = function(){ switchTab(t) }
    var m = TAB_META[t]
    btn.innerHTML = svgIcon(m.icon) + '<span>' + m.label + '</span>'
    bar.appendChild(btn)
  })
  currentTab = MFI_TABS[0]
}

function switchTab(tab) {
  currentTab = tab
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab) })
  if (DATA) { killCharts(); renderCurrentTab() }
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchAndRender() {
  setMain('<div class="loading"><div class="spinner"></div><div>Chargement…</div></div>')
  try {
    var res = await fetch(FUNCTIONS_URL + '/get-partner-stats', { headers:{'Authorization':'Bearer '+TOKEN} })
    if (res.status === 401) { logout(); return }
    if (!res.ok) throw new Error('HTTP ' + res.status)
    DATA = await res.json()
    killCharts(); renderCurrentTab()
  } catch (e) {
    setMain('<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div style="margin-bottom:14px">Impossible de charger les donn\xe9es.<br><small style="color:var(--muted)">'+e.message+'</small></div><button onclick="fetchAndRender()" class="btn-outline" style="margin:0 auto">&#8634; R\xe9essayer</button></div>')
  }
}

function renderCurrentTab() {
  ({overview:renderOverview, credit:renderCredit, risque:renderRisqueMF, simulateur:renderSimulateur}[currentTab]||renderOverview)()
}

// ════ VUE D'ENSEMBLE ══════════════════════════════════════════════════════════
function renderOverview() {
  var mf    = DATA.microfinance || {}
  var stats = mf.stats || {}
  var users = mf.users || []
  var taux  = stats.total ? Math.round(stats.eligible / stats.total * 100) : 0
  var vuln  = (DATA.ong && DATA.ong.diagnostics && DATA.ong.diagnostics.vulnerabilite) || []
  var urgent = vuln.filter(function(v){return v.urgency==='\xc9lev\xe9e'})

  var html = '<div class="page-header"><h2 class="section-title">Vue d\'ensemble</h2><p class="section-sub">Tableau de bord MFI — mis \xe0 jour le '+fmtDate(DATA.last_updated)+'</p></div>'
  if (urgent.length > 0) html += '<div class="warn-banner">&#9888;&#65039; <strong>Risque phytosanitaire :</strong> '+urgent.length+' maladie(s) \xe0 urgence \xe9lev\xe9e d\xe9tect\xe9e(s) sur le terrain ('+urgent.slice(0,2).map(function(v){return v.name}).join(', ')+'). Risque de perte de r\xe9colte \xe0 surveiller dans le portefeuille.</div>'

  html += '<div class="kpi-grid">'
  html += kpiCard('','&#128106;',stats.total,'Dossiers \xe9valu\xe9s')
  html += kpiCard('kpi-green','&#9989;',stats.eligible,'\xc9ligibles cr\xe9dit')
  html += kpiCard('','&#11088;',stats.score_moyen||null,'Score agricole moyen')
  html += kpiCard('kpi-amber','&#128200;',taux||null,'Taux d\'\xe9ligibilit\xe9','%')
  html += '</div>'

  html += '<div class="subsection-label">Analyse du portefeuille</div>'
  html += '<div class="charts-grid">'
  html += '<div class="chart-card"><div class="chart-title">Distribution des scores agricoles</div><div class="chart-wrap"><canvas id="cMfDist"></canvas></div></div>'
  html += '<div class="chart-card"><div class="chart-title">R\xe9partition par statut</div><div class="chart-wrap"><canvas id="cMfStatut"></canvas></div></div>'
  html += '</div>'

  var regMap = {}
  users.forEach(function(u){ var r=u.region||'Non renseign\xe9e'; if(!regMap[r]) regMap[r]={eligible:0,total:0}; regMap[r].total++; if(u.statut==='\xc9ligible cr\xe9dit') regMap[r].eligible++ })
  var regKeys = Object.keys(regMap).sort(function(a,b){return regMap[b].total-regMap[a].total}).slice(0,8)
  if (regKeys.length > 1) html += '<div class="chart-card" style="margin-bottom:24px"><div class="chart-title">&#128205; \xc9ligibilit\xe9 par r\xe9gion</div><div class="chart-wrap" style="height:200px"><canvas id="cMfReg"></canvas></div></div>'

  setMain(html)
  setTimeout(function() {
    var dist = [
      {l:'0–20', n:users.filter(function(u){return(u.score||0)<=20}).length},
      {l:'21–40',n:users.filter(function(u){return(u.score||0)>20&&(u.score||0)<=40}).length},
      {l:'41–60',n:users.filter(function(u){return(u.score||0)>40&&(u.score||0)<=60}).length},
      {l:'61–80',n:users.filter(function(u){return(u.score||0)>60&&(u.score||0)<=80}).length},
      {l:'81+',       n:users.filter(function(u){return(u.score||0)>80}).length}
    ]
    mkChart('cMfDist',{type:'bar',data:{labels:dist.map(function(d){return d.l}),datasets:[{label:'Agriculteurs',data:dist.map(function(d){return d.n}),backgroundColor:['#C0392B','#D68910','#F0B429','#36AF3B','#1A5319'],borderRadius:7}]},options:axisOpts({legend:false})})
    var stMap={}; users.forEach(function(u){var k=u.statut||'Non \xe9valu\xe9';stMap[k]=(stMap[k]||0)+1})
    mkChart('cMfStatut',{type:'doughnut',data:{labels:Object.keys(stMap),datasets:[{data:Object.values(stMap),backgroundColor:Object.keys(stMap).map(function(k){return SCOL[k]||'#aaa'}),borderWidth:2,borderColor:'#fff'}]},options:donutOpts()})
    if(regKeys.length>1) mkChart('cMfReg',{type:'bar',data:{labels:regKeys,datasets:[{label:'Total',data:regKeys.map(function(r){return regMap[r].total}),backgroundColor:'rgba(36,113,163,.2)',borderRadius:5},{label:'\xc9ligibles',data:regKeys.map(function(r){return regMap[r].eligible}),backgroundColor:'#2471A3',borderRadius:5}]},options:axisOpts({legend:true})})
  }, 80)
}

// Calcul du TEG réel (taux effectif global annuel) par dichotomie sur la VAN
function computeTEG(principal, mensualite, duree) {
  if (!principal||!mensualite||!duree||mensualite<=0) return 0
  var lo=0.000001, hi=10, r
  for(var i=0;i<60;i++){
    r=(lo+hi)/2
    var pv = r>0 ? mensualite*(1-Math.pow(1+r,-duree))/r : mensualite*duree
    if(pv>principal) lo=r; else hi=r
  }
  return Math.round(r*12*10000)/100  // retourne % avec 2 décimales
}

  var regM    = parseFloat((document.getElementById('simRegion')||{value:1}).value)||1
  var taux    = Math.min(TAUX_CUSTOM[secId]||sec.taux, BCEAO_CAP)
  var rc      = document.getElementById('simResultContent')
  var pc      = document.getElementById('simPlanContent')
  if (!rc) return

  // Mise à jour info taux en temps réel
  var info = document.getElementById('simTypeInfo')
  if (info && isAgri) info.innerHTML = '<div class="info-banner" style="font-size:12px;margin-bottom:0">&#127807; <strong>Secteur agricole</strong> — Montant indicatif basé sur score × surface. L&#39;agent fixe le montant final. Taux actuel : <strong>'+taux+'% / an</strong></div>'
  else if (info && !isAgri) info.innerHTML = '<div style="background:#EEF4FF;border:1px solid #BBCEF8;border-radius:10px;padding:10px 14px;font-size:12px;color:#1a3a6e"><strong>&#127981; Activité non agricole</strong> — '+esc(sec.desc||'')+'<br>Montant saisi librement par l&#39;agent. Plafond : <strong>'+Number(sec.plafond).toLocaleString('fr-FR')+' FCFA</strong>. Taux actuel : <strong>'+taux+'% / an</strong></div>'

  var montant, duree, eligible=true, eligPartiel=false

  if (isAgri) {
    var score   = parseInt((document.getElementById('simScore')||{value:60}).value)||0
    var surface = parseFloat((document.getElementById('simSurface')||{value:2}).value)||1
    var sv = document.getElementById('simScoreVal'); if(sv) sv.textContent = score
    eligible    = score >= 61
    eligPartiel = score >= 41 && score < 61
    if (!eligible && !eligPartiel) {
      rc.innerHTML='<div style="background:#FDECEA;border-radius:10px;padding:16px"><strong style="color:#922B21">&#10060; Score insuffisant ('+score+'/100)</strong><br><span style="font-size:12px;color:#922B21;margin-top:6px;display:block">Score minimum requis : 41/100. Recommander un programme de renforcement avant réévaluation dans 6 mois.</span></div>'
      if(pc) pc.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">&#8212;</div>'
      return
    }
    // Montant indicatif (suggestion modèle)
    var scoreMulti = 0.4 + (score/100)*0.9
    var indicatif  = Math.round(sec.basePha * surface * scoreMulti * histo * regM / 5000)*5000
    // Afficher la suggestion
    var indDiv = document.getElementById('simMontantIndicatif')
    var indVal = document.getElementById('simIndVal')
    if (indDiv) indDiv.style.display = 'block'
    if (indVal) indVal.textContent   = Number(indicatif).toLocaleString('fr-FR')
    // Pré-remplir si l\'agent n\'a pas encore saisi manuellement
    var mfEl = document.getElementById('simMontantFinal')
    if (mfEl && (!mfEl.dataset.manual || mfEl.dataset.manual==='0')) mfEl.value = indicatif
    montant = Math.round((parseFloat(mfEl&&mfEl.value)||indicatif)/5000)*5000
    duree   = Math.max(1, Math.min(parseInt((document.getElementById('simDureeAgri')||{value:sec.duree}).value)||sec.duree, 60))
  } else {
    montant = Math.round((parseFloat((document.getElementById('simMontant')||{value:500000}).value)||500000)/5000)*5000
    duree   = Math.max(1, Math.min(parseInt((document.getElementById('simDuree')||{value:12}).value)||12, 60))
  }

  if (!montant || montant <= 0) {
    rc.innerHTML='<div style="background:#FFF3E0;border-radius:10px;padding:14px;font-size:13px;color:#7D4E00">&#9888; Saisir un montant accordé pour lancer la simulation.</div>'
    if(pc) pc.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">&#8212;</div>'
    return
  }

  var tauxM = taux/12/100
  var mensualite, totalR, interets, teg

  if (methode === 'flat') {
    // Intérêts calculés sur le capital initial (méthode terrain BF)
    var intTotal = Math.round(montant * (taux/100) * (duree/12))
    totalR     = montant + intTotal
    mensualite = Math.round(totalR / duree / 100) * 100
    interets   = mensualite * duree - montant
    teg        = computeTEG(montant, mensualite, duree)
  } else {
    // Dégressif PMT (BCEAO)
    mensualite = tauxM>0
      ? Math.round(montant*tauxM*Math.pow(1+tauxM,duree)/(Math.pow(1+tauxM,duree)-1)/100)*100
      : Math.round(montant/duree/100)*100
    totalR   = mensualite*duree
    interets = totalR-montant
    teg      = taux
  }

  // Badge méthode
  var methodeBadge = methode==='flat'
    ? '<span style="background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700">FLAT</span>'
    : '<span style="background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700">DÉGRESSIF</span>'

  // Alerte TEG pour méthode flat
  var tegHtml = ''
  if (methode==='flat' && teg>0) {
    var overCap = teg > BCEAO_CAP
    tegHtml = '<div style="background:'+(overCap?'#FDECEA':'#FFF8E1')+';border:1px solid '+(overCap?'#F5C6C6':'#FFD54F')+';border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:'+(overCap?'#922B21':'#7D6608')+'">'
      + (overCap?'&#9888;&#65039; <strong>TEG réel : '+teg+'% / an — DÉPASSE LE PLAFOND BCEAO (24%)</strong>':'&#8505;&#65039; TEG réel : <strong>'+teg+'% / an</strong> — supérieur au taux nominal ('+taux+'%) en méthode flat')
      + '</div>'
  }

  var statusHtml = ''
  if (isAgri) {
    statusHtml = eligible
      ? '<div style="background:#E8F5E9;border-radius:10px;padding:10px 14px;margin-bottom:14px"><strong style="color:#1B5E20">&#9989; ÉLIGIBLE — score '+(document.getElementById('simScore')||{value:60}).value+'/100</strong></div>'
      : '<div style="background:#FFF8E1;border-radius:10px;padding:10px 14px;margin-bottom:14px"><strong style="color:#7D6608">&#9888; ÉLIGIBLE PARTIEL — accord conditionnel</strong><br><span style="font-size:11px;color:#7D6608">Suivi renforcé recommandé — montant à valider</span></div>'
  } else {
    statusHtml = '<div style="background:#E3F2FD;border-radius:10px;padding:10px 14px;margin-bottom:14px"><strong style="color:#0D47A1">&#128309; ANALYSE COMPLÉTÉE — montant saisi par l&#39;agent</strong></div>'
  }

  rc.innerHTML = statusHtml + tegHtml
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
    + '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:5px">Montant accordé</div><div class="sim-montant">'+Number(montant).toLocaleString('fr-FR')+'</div><div style="font-size:10px;color:var(--muted);margin-top:4px">FCFA — '+duree+' mois</div></div>'
    + '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:5px">Mensualité</div><div class="sim-mensualite">'+Number(mensualite).toLocaleString('fr-FR')+'</div><div style="font-size:10px;color:var(--muted);margin-top:4px">FCFA / mois</div></div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;text-align:center;padding-top:12px;border-top:1px solid var(--border)">'
    + '<div><div style="font-size:10px;color:var(--muted)">Total remboursé</div><div style="font-weight:700;font-family:\'DM Mono\',monospace;font-size:12px">'+Number(totalR).toLocaleString('fr-FR')+' F</div></div>'
    + '<div><div style="font-size:10px;color:var(--muted)">Coût crédit</div><div style="font-weight:700;font-family:\'DM Mono\',monospace;font-size:12px;color:var(--amber)">'+Number(interets).toLocaleString('fr-FR')+' F</div></div>'
    + '<div><div style="font-size:10px;color:var(--muted)">Taux nominal</div><div style="font-weight:700;font-family:\'DM Mono\',monospace;font-size:12px;color:var(--vert)">'+taux+'% / an</div></div>'
    + '<div><div style="font-size:10px;color:var(--muted)">Méthode</div><div style="margin-top:3px">'+methodeBadge+'</div></div>'
    + '</div>'

  // Échéancier
  var now=new Date(), solde=montant, rows=''
  var showMonths=Math.min(duree,10)
  var intFlatM = methode==='flat' ? Math.round(montant*tauxM) : 0
  for(var m=0;m<showMonths;m++){
    var dm=new Date(now.getFullYear(),now.getMonth()+m+1,1)
    var intM, capM
    if (methode==='flat') {
      intM = intFlatM   // constant sur capital initial
      capM = mensualite - intM
    } else {
      intM = Math.round(solde*tauxM)
      capM = mensualite-intM
    }
    solde=Math.max(0,solde-capM)
    rows+='<tr><td style="padding:6px 10px;font-size:11px;border-top:1px solid #f0f4f0;color:var(--muted)">'+dm.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})+'</td>'
      +'<td style="padding:6px 10px;font-size:11px;font-family:\'DM Mono\',monospace;text-align:right;border-top:1px solid #f0f4f0">'+Number(mensualite).toLocaleString('fr-FR')+'</td>'
      +'<td style="padding:6px 10px;font-size:11px;text-align:right;color:var(--amber);font-family:\'DM Mono\',monospace;border-top:1px solid #f0f4f0">'+Number(intM).toLocaleString('fr-FR')+'</td>'
      +'<td style="padding:6px 10px;font-size:11px;text-align:right;color:var(--muted);font-family:\'DM Mono\',monospace;border-top:1px solid #f0f4f0">'+Number(Math.round(solde/1000)*1000).toLocaleString('fr-FR')+'</td></tr>'
  }
  if(duree>showMonths) rows+='<tr><td colspan="4" style="padding:6px 10px;text-align:center;font-size:11px;color:var(--muted);border-top:1px solid #f0f4f0">… '+(duree-showMonths)+' mois supplémentaires</td></tr>'
  var thInt = methode==='flat' ? 'Intérêts (capital initial)' : 'Intérêts (solde restant)'
  if(pc) pc.innerHTML='<table style="width:100%;border-collapse:collapse"><thead><tr>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:left">Mois</th>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:right">Mensualité (FCFA)</th>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:right">'+thInt+'</th>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:right">Solde restant</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>'
}


// ── PAGINATION ────────────────────────────────────────────────────────────────
function buildPagination(cid,pages,ctx) {
  var pag=document.getElementById(cid);if(!pag)return;pag.innerHTML=''
  if(currentPage>1)addPageBtn(pag,'‹',currentPage-1,false,ctx)
  for(var p=Math.max(1,currentPage-2);p<=Math.min(pages,currentPage+2);p++)addPageBtn(pag,p,p,p===currentPage,ctx)
  if(currentPage<pages)addPageBtn(pag,'›',currentPage+1,false,ctx)
}
function addPageBtn(container,label,page,active,ctx) {
  var b=document.createElement('button');b.className='page-btn'+(active?' active':'');b.textContent=label
  var p=page;b.onclick=function(){currentPage=p;renderCreditTable()}
  if(active)b.disabled=true;container.appendChild(b)
}

// ── LOGOUT ────────────────────────────────────────────────────────────────────
function logout() {
  sessionStorage.removeItem('mfi_token');sessionStorage.removeItem('mfi_user')
  TOKEN=null;USER=null;DATA=null;killCharts()
  document.getElementById('loginScreen').style.display='flex'
  document.getElementById('app').style.display='none'
  document.getElementById('username').value='';document.getElementById('password').value=''
  document.getElementById('loginError').textContent=''
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtN(n)      { return n!=null?Number(n).toLocaleString('fr-FR'):'—' }
function fmtDate(iso) { return iso?new Date(iso).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}):'—' }
function fmtYear(iso) { return iso?new Date(iso).getFullYear():'—' }
function esc(s)       { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function kpiCard(cls,icon,val,label,suffix) {
  var display=(val===null||val===undefined||val===''||val===0&&label.includes('Score'))?'—':fmtN(val)+(suffix||'')
  if(val===0&&!label.includes('Score'))display='0'
  return '<div class="kpi-card '+(cls||'')+'"><div class="kpi-icon">'+icon+'</div><div class="kpi-value">'+display+'</div><div class="kpi-label">'+label+'</div></div>'
}
function statutBadge(s) { var m={'\xc9ligible cr\xe9dit':'b-green','\xc0 \xe9valuer':'b-amber','Insuffisant':'b-red'}; return '<span class="badge '+(m[s]||'b-gray')+'">'+esc(s||'Non \xe9valu\xe9')+'</span>' }

// ════ RAPPORT PDF — bilan pour le renouvellement du contrat ════════════════════
function generateReport() {
  if (!DATA || !DATA.microfinance) { alert('Chargez d\'abord les donn\xe9es.'); return }
  var mf    = DATA.microfinance
  var stats = mf.stats || {}
  var users = mf.users || []
  var now   = new Date()
  var taux  = stats.total ? Math.round((stats.eligible/stats.total)*100) : 0

  // Répartition par statut
  var byStatut = {}
  users.forEach(function(u){ var s=u.statut||'Non \xe9valu\xe9'; byStatut[s]=(byStatut[s]||0)+1 })
  // Répartition par région
  var byRegion = {}
  users.forEach(function(u){ var r=u.region||'Non renseign\xe9e'; byRegion[r]=(byRegion[r]||0)+1 })

  var h = '<h1>&#127793; CultivaTech — Rapport Microfinance</h1>'
  h += '<div class="r-sub">'+esc(USER.organization||USER.name||'Microfinance partenaire')+'</div>'
  h += '<div class="r-sub">G\xe9n\xe9r\xe9 le '+now.toLocaleDateString('fr-FR',{dateStyle:'long'})+'</div>'

  h += '<h2>Indicateurs cl\xe9s</h2><div class="r-kpis">'
  h += '<div class="r-kpi"><b>'+(stats.total||0)+'</b><span>Dossiers \xe9valu\xe9s</span></div>'
  h += '<div class="r-kpi"><b>'+(stats.eligible||0)+'</b><span>\xc9ligibles cr\xe9dit</span></div>'
  h += '<div class="r-kpi"><b>'+(stats.score_moyen||'—')+'</b><span>Score agricole moyen</span></div>'
  h += '<div class="r-kpi"><b>'+taux+'%</b><span>Taux d\'\xe9ligibilit\xe9</span></div>'
  h += '</div>'

  var stKeys = Object.keys(byStatut)
  if (stKeys.length) {
    h += '<h2>R\xe9partition par statut d\'\xe9ligibilit\xe9</h2><table><tr><th>Statut</th><th>Dossiers</th><th>Part</th></tr>'
    stKeys.sort(function(a,b){return byStatut[b]-byStatut[a]}).forEach(function(s){
      var pct = users.length ? Math.round(byStatut[s]/users.length*100) : 0
      h += '<tr><td>'+esc(s)+'</td><td>'+byStatut[s]+'</td><td>'+pct+'%</td></tr>'
    })
    h += '</table>'
  }

  var rgKeys = Object.keys(byRegion)
  if (rgKeys.length) {
    h += '<h2>Couverture par r\xe9gion</h2><table><tr><th>R\xe9gion</th><th>Dossiers</th></tr>'
    rgKeys.sort(function(a,b){return byRegion[b]-byRegion[a]}).slice(0,15).forEach(function(r){
      h += '<tr><td>'+esc(r)+'</td><td>'+byRegion[r]+'</td></tr>'
    })
    h += '</table>'
  }

  // Top dossiers éligibles (meilleurs scores)
  var elig = users.filter(function(u){return u.statut==='\xc9ligible cr\xe9dit'})
                  .sort(function(a,b){return (b.score||0)-(a.score||0)}).slice(0,15)
  if (elig.length) {
    h += '<h2>Meilleurs profils \xe9ligibles</h2><table><tr><th>Agriculteur</th><th>Score</th><th>R\xe9gion</th><th>Province</th></tr>'
    elig.forEach(function(u){
      var nom = ((u.first_name||'')+' '+(u.last_name||'')).trim() || 'Agriculteur'
      h += '<tr><td>'+esc(nom)+'</td><td>'+(u.score||0)+'</td><td>'+esc(u.region||'—')+'</td><td>'+esc(u.province||'—')+'</td></tr>'
    })
    h += '</table>'
  }

  h += '<div class="r-foot">Rapport g\xe9n\xe9r\xe9 par CultivaTech &middot; scoring agricole &amp; analyse de risque de cr\xe9dit<br>'
  h += 'SAW-SARL &middot; Burkina Faso &middot; +226 71 91 17 44 &middot; Donn\xe9es bas\xe9es sur le consentement des agriculteurs</div>'

  document.getElementById('reportView').innerHTML = h
  window.print()
}
</script>
<div id="reportView"></div>
