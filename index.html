<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CultivaTech — Portail Microfinance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --vert:#1A5319;--vert2:#36AF3B;--vert-pale:#D6EFD8;--vert-bg:#F4FAF4;
    --or:#C8A84B;--bg:#F0F4F0;--card:#FFFFFF;
    --border:#E4EDE4;--text:#1A2E1A;--muted:#6B8F6B;
    --red:#C0392B;--amber:#D68910;--blue:#2471A3;--purple:#7D3C98;
    --shadow:0 2px 8px rgba(26,83,25,.10),0 8px 32px rgba(26,83,25,.07);
    --shadow-lg:0 4px 24px rgba(26,83,25,.14),0 12px 48px rgba(26,83,25,.10);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  /* LOGIN */
  #loginScreen{position:fixed;inset:0;z-index:1000;background:linear-gradient(145deg,#060B1B 0%,#0D1A3A 35%,#1A2F5E 65%,#0A1F45 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .login-orbs{position:absolute;inset:0;pointer-events:none}
  .login-orbs::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(36,113,163,.12) 0%,transparent 70%);top:-100px;right:-100px}
  .login-orbs::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,75,.08) 0%,transparent 70%);bottom:-80px;left:-80px}
  .login-card{position:relative;background:rgba(255,255,255,.06);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:52px 48px;width:420px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.4)}
  .login-logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
  .login-logo{font-family:'Playfair Display',serif;font-size:28px;color:#fff;letter-spacing:-.5px}
  .login-leaf{font-size:28px}
  .login-sub{color:rgba(255,255,255,.4);font-size:12px;letter-spacing:.3px;margin-bottom:8px}
  .login-divider{width:40px;height:1px;background:rgba(36,113,163,.4);margin:16px auto 20px}
  .login-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(36,113,163,.18);border:1px solid rgba(36,113,163,.35);color:rgba(100,168,220,.9);font-size:11px;font-weight:600;padding:6px 18px;border-radius:20px;margin-bottom:28px;letter-spacing:.8px;text-transform:uppercase}
  .login-label{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;text-align:left}
  .login-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:14px 18px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;transition:all .2s}
  .login-input::placeholder{color:rgba(255,255,255,.28)}
  .login-input:focus{border-color:rgba(36,113,163,.6);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(36,113,163,.1)}
  .login-btn{width:100%;background:linear-gradient(135deg,#2471A3 0%,#1a5c8a 100%);border:none;border-radius:13px;padding:15px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;margin-top:6px;letter-spacing:.3px;box-shadow:0 4px 20px rgba(36,113,163,.35)}
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(36,113,163,.45)}
  .login-btn:disabled{opacity:.5;transform:none;cursor:not-allowed;box-shadow:none}
  .login-error{color:#ff8a80;font-size:12px;margin-top:10px;min-height:18px}
  /* APP */
  #app{display:none;min-height:100vh}
  .topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:62px;padding:0 36px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 12px rgba(26,83,25,.08)}
  .topbar-left{display:flex;align-items:center;gap:14px}
  .topbar-logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--vert);letter-spacing:-.3px}
  .topbar-sep{width:1px;height:22px;background:var(--border)}
  .topbar-role{display:inline-flex;align-items:center;gap:6px;padding:4px 13px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .badge-mfi{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);color:#0D47A1;border:1px solid #90CAF9}
  .topbar-name{font-size:13px;color:var(--muted);font-weight:500}
  .topbar-right{display:flex;align-items:center;gap:14px}
  .topbar-region{font-size:12px;color:var(--muted);background:var(--vert-bg);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
  .refresh-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:4px}
  .refresh-btn:hover{border-color:var(--blue);color:var(--blue)}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
  .logout-btn:hover{border-color:var(--red);color:var(--red);background:#fff5f5}
  .tab-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 36px;display:flex;gap:4px}
  .tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:14px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
  .content{padding:36px;max-width:1360px;margin:0 auto}
  .page-header{margin-bottom:28px}
  .section-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--vert);margin-bottom:5px}
  .section-sub{font-size:13px;color:var(--muted)}
  .subsection-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin:32px 0 14px;display:flex;align-items:center;gap:8px}
  .subsection-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
  .kpi-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);border-radius:3px 3px 0 0}
  .kpi-card.kpi-green::before{background:var(--vert2)}
  .kpi-card.kpi-amber::before{background:var(--amber)}
  .kpi-card.kpi-red::before{background:var(--red)}
  .kpi-card.kpi-purple::before{background:var(--purple)}
  .kpi-icon{font-size:24px;line-height:1}
  .kpi-value{font-size:30px;font-weight:700;color:var(--blue);letter-spacing:-1.5px;line-height:1}
  .kpi-label{font-size:12px;color:var(--muted);font-weight:500;line-height:1.3}
  .kpi-card.kpi-green .kpi-value{color:var(--vert2)}
  .kpi-card.kpi-amber .kpi-value{color:var(--amber)}
  .kpi-card.kpi-red .kpi-value{color:var(--red)}
  .kpi-card.kpi-purple .kpi-value{color:var(--purple)}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  .charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:var(--shadow)}
  .chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:7px}
  .chart-wrap{position:relative;height:260px}
  .alerte-strip{background:linear-gradient(135deg,#FDECEA,#FDEDEA);border:1px solid #FADBD8;border-left:4px solid var(--red);border-radius:12px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px;margin-bottom:22px}
  .alerte-strip .alerte-icon{font-size:20px;flex-shrink:0;margin-top:1px}
  .alerte-strip .alerte-title{font-weight:600;color:var(--red);font-size:13px;margin-bottom:3px}
  .alerte-strip .alerte-desc{font-size:12px;color:#922B21}
  .info-banner{background:linear-gradient(135deg,#F0F9F0,#EAF5EA);border:1px solid var(--vert-pale);border-left:4px solid var(--vert2);border-radius:12px;padding:14px 18px;font-size:13px;color:var(--vert);display:flex;align-items:center;gap:10px;margin-bottom:20px}
  .warn-banner{background:linear-gradient(135deg,#FFF8E1,#FFF3CD);border:1px solid #FFE082;border-left:4px solid var(--amber);border-radius:12px;padding:13px 16px;font-size:12px;color:#7D6608;display:flex;align-items:center;gap:8px;margin-bottom:20px}
  .conf-banner{background:linear-gradient(135deg,#EDE7F6,#E8EAF6);border:1px solid #B39DDB;border-left:4px solid var(--purple);border-radius:12px;padding:13px 16px;font-size:12px;color:#4A148C;display:flex;align-items:center;gap:8px;margin-bottom:20px}
  .table-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:24px}
  .table-head{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;background:linear-gradient(to right,#fff,#FAFCFA)}
  .table-title{font-size:14px;font-weight:600;color:var(--text)}
  .table-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .search-input{border:1px solid var(--border);border-radius:9px;padding:8px 13px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);width:200px;transition:all .2s;background:#FAFCFA}
  .search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(36,113,163,.1);background:#fff}
  .filter-select{border:1px solid var(--border);border-radius:9px;padding:8px 10px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);background:#FAFCFA;cursor:pointer;transition:all .2s}
  .filter-select:focus{border-color:var(--blue)}
  table{width:100%;border-collapse:collapse}
  th{background:var(--vert-bg);padding:10px 18px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  td{padding:12px 18px;font-size:13px;border-top:1px solid #F0F4F0}
  tr:hover td{background:#F8FBF8}
  .table-foot{padding:13px 22px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:var(--vert-bg)}
  .table-info{font-size:12px;color:var(--muted)}
  .pagination{display:flex;gap:4px}
  .page-btn{border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:12px;cursor:pointer;background:#fff;font-family:'DM Sans',sans-serif;color:var(--text);transition:all .15s}
  .page-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
  .page-btn:hover:not(.active){border-color:var(--blue);color:var(--blue)}
  .page-btn:disabled{cursor:default;opacity:.4}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
  .b-green{background:#E8F5E9;color:#1B5E20}
  .b-amber{background:#FFF8E1;color:#E65100}
  .b-red{background:#FDECEA;color:#B71C1C}
  .b-blue{background:#E3F2FD;color:#0D47A1}
  .b-gray{background:#F5F5F5;color:#424242}
  .b-purple{background:#F3E5F5;color:#4A148C}
  .score-row{display:flex;align-items:center;gap:8px}
  .score-bar{height:7px;border-radius:4px;background:#EEF2EE;flex:1;overflow:hidden}
  .score-fill{height:100%;border-radius:4px;transition:width .5s ease}
  .score-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);min-width:34px;text-align:right}
  .loading{text-align:center;padding:80px;color:var(--muted)}
  .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:60px;color:var(--muted)}
  .empty-icon{font-size:42px;margin-bottom:14px}
  .btn-outline{background:none;border:1px solid var(--border);border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .2s;display:inline-flex;align-items:center;gap:5px}
  .btn-outline:hover{border-color:var(--blue);color:var(--blue);background:#F0F7FF}
  /* SIMULATEUR */
  .sim-group-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:6px 14px;background:var(--vert-bg);border-bottom:1px solid var(--border)}
  .rate-panel{background:#F8F9FF;border:1px solid #D0D8F0;border-radius:12px;padding:16px;margin-top:12px}
  .rate-panel-toggle{background:none;border:1px solid var(--border);border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--blue);transition:all .2s;display:flex;align-items:center;gap:6px;width:100%}
  .rate-panel-toggle:hover{background:#EEF4FF}
  .rate-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #EEF2EE}
  .rate-row:last-child{border-bottom:none}
  .rate-name{font-size:11px;flex:1;color:var(--text)}
  .rate-input{width:70px;border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-size:12px;font-family:'DM Mono',monospace;text-align:right;outline:none;transition:border-color .2s}
  .rate-input:focus{border-color:var(--blue)}
  .rate-unit{font-size:11px;color:var(--muted);min-width:32px}
  .rate-cap{font-size:9px;color:var(--red);font-weight:600}
  .sim-result-box{background:var(--card);border:2px solid var(--vert-pale);border-radius:14px;padding:20px}
  .sim-montant{font-size:32px;font-weight:700;color:var(--vert);font-family:'DM Mono',monospace;line-height:1;letter-spacing:-1px}
  .sim-mensualite{font-size:28px;font-weight:700;color:var(--blue);font-family:'DM Mono',monospace;line-height:1}
  @media(max-width:900px){.charts-grid,.charts-grid-3{grid-template-columns:1fr}}
  @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.topbar{padding:0 16px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-orbs"></div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <span class="login-leaf">&#127807;</span>
      <span class="login-logo">CultivaTech</span>
    </div>
    <div class="login-sub">Agriculture intelligente au Burkina Faso</div>
    <div class="login-divider"></div>
    <div class="login-badge">&#127981; Portail Microfinance</div>
    <div class="login-label">Vos identifiants</div>
    <input class="login-input" id="username" type="text" placeholder="Identifiant" autocomplete="username">
    <input class="login-input" id="password" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">&#127807; CultivaTech</span>
      <div class="topbar-sep"></div>
      <span class="topbar-role badge-mfi">&#127981; MFI</span>
      <span id="topbarName" class="topbar-name"></span>
    </div>
    <div class="topbar-right">
      <span id="topbarRegion" class="topbar-region"></span>
      <button class="refresh-btn" onclick="fetchAndRender()">&#8635; Actualiser</button>
      <button class="logout-btn" onclick="logout()">D&#233;connexion</button>
    </div>
  </header>
  <nav class="tab-bar" id="tabBar"></nav>
  <main class="content" id="mainContent">
    <div class="loading"><div class="spinner"></div><div>Chargement&#8230;</div></div>
  </main>
</div>

<script>
var FUNCTIONS_URL = 'https://vyqhzagajlbosikzfnit.supabase.co/functions/v1'
var TOKEN        = sessionStorage.getItem('mfi_token')
var USER         = JSON.parse(sessionStorage.getItem('mfi_user') || 'null')
var DATA         = null
var CHARTS       = {}
var currentTab   = null
var filteredRows = []
var currentPage  = 1
var PAGE_SIZE    = 15

var TAB_META = {
  overview:   {icon:'&#128202;', label:"Vue d'ensemble"},
  credit:     {icon:'&#127807;', label:'Cr\xe9dit agricole'},
  risque:     {icon:'&#128201;', label:'Risque portefeuille'},
  simulateur: {icon:'&#129518;', label:'Simulateur cr\xe9dit'}
}
var MFI_TABS = ['overview','credit','risque','simulateur']

if (TOKEN && USER && USER.role === 'microfinance') { showApp(); fetchAndRender() }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  var username = document.getElementById('username').value.trim()
  var password = document.getElementById('password').value
  var errEl    = document.getElementById('loginError')
  errEl.textContent = ''
  if (!username || !password) { errEl.textContent = 'Identifiant et mot de passe requis.'; return }
  var btn = document.getElementById('loginBtn')
  btn.textContent = 'Connexion…'; btn.disabled = true
  try {
    var res  = await fetch(FUNCTIONS_URL + '/partner-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:username,password:password,role:'microfinance'}) })
    var data = await res.json()
    if (!res.ok) { errEl.textContent = data.error || 'Identifiants incorrects.'; btn.textContent = 'Se connecter'; btn.disabled = false; return }
    TOKEN = data.token; USER = data.user
    sessionStorage.setItem('mfi_token', TOKEN)
    sessionStorage.setItem('mfi_user', JSON.stringify(USER))
    showApp(); await fetchAndRender()
  } catch (_) { errEl.textContent = 'Erreur r\xe9seau.'; btn.textContent = 'Se connecter'; btn.disabled = false }
}

document.getElementById('username').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('password').focus() })
document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin() })

// ── APP ───────────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  document.getElementById('topbarName').textContent = USER.name
  document.getElementById('topbarRegion').textContent = '\u{1F4CD} ' + (USER.region || 'National')
  buildTabBar()
}

function buildTabBar() {
  var bar = document.getElementById('tabBar'); bar.innerHTML = ''
  MFI_TABS.forEach(function(t, i) {
    var btn = document.createElement('button')
    btn.className = 'tab-btn' + (i===0?' active':'')
    btn.dataset.tab = t
    btn.onclick = function(){ switchTab(t) }
    var m = TAB_META[t]
    btn.innerHTML = m.icon + ' ' + m.label
    bar.appendChild(btn)
  })
  currentTab = MFI_TABS[0]
}

function switchTab(tab) {
  currentTab = tab
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab) })
  if (DATA) { killCharts(); renderCurrentTab() }
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchAndRender() {
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div><div>Chargement…</div></div>'
  try {
    var res = await fetch(FUNCTIONS_URL + '/get-partner-stats', { headers:{'Authorization':'Bearer '+TOKEN} })
    if (res.status === 401) { logout(); return }
    if (!res.ok) throw new Error('HTTP ' + res.status)
    DATA = await res.json()
    killCharts(); renderCurrentTab()
  } catch (e) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div style="margin-bottom:14px">Impossible de charger les donn\xe9es.<br><small style="color:var(--muted)">'+e.message+'</small></div><button onclick="fetchAndRender()" class="btn-outline" style="margin:0 auto">&#8634; R\xe9essayer</button></div>'
  }
}

function renderCurrentTab() {
  ({overview:renderOverview, credit:renderCredit, risque:renderRisqueMF, simulateur:renderSimulateur}[currentTab]||renderOverview)()
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function killCharts() { Object.values(CHARTS).forEach(function(c){try{c.destroy()}catch(e){}}); CHARTS={} }
function mkChart(id, cfg) {
  var el = document.getElementById(id); if(!el) return null
  try { var ex=Chart.getChart(el); if(ex) ex.destroy() } catch(e){}
  CHARTS[id] = new Chart(el, cfg); return CHARTS[id]
}
function axisOpts(opt) {
  opt=opt||{}
  return { responsive:true,maintainAspectRatio:false,

function filterCredit() {
  var q      = (document.getElementById('searchCredit')||{value:''}).value.toLowerCase()
  var statut = (document.getElementById('filterStatut')||{value:''}).value
  var region = (document.getElementById('filterRegion')||{value:''}).value
  var all    = (DATA.microfinance && DATA.microfinance.users) || []
  filteredRows = all.filter(function(u){ var name=((u.first_name||'')+' '+(u.last_name||'')).toLowerCase(); return(!q||name.includes(q)||(u.phone_number||'').includes(q))&&(!statut||u.statut===statut)&&(!region||u.region===region) })
  currentPage=1; renderCreditTable()
}

function renderCreditTable() {
  var total=filteredRows.length,pages=Math.ceil(total/PAGE_SIZE)||1
  currentPage=Math.min(currentPage,pages)
  var slice=filteredRows.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE)
  var body=document.getElementById('creditBody');if(!body)return
  body.innerHTML=slice.length===0?'<tr><td colspan="8" style="text-align:center;padding:28px;color:var(--muted)">Aucun r\xe9sultat</td></tr>':slice.map(function(u,i){var idx=(currentPage-1)*PAGE_SIZE+i+1;var sc=u.score||0;var bar=Math.min(sc,100);var col=sc>=61?'var(--vert2)':sc>=41?'var(--amber)':'var(--red)';return'<tr><td style="color:var(--muted);font-size:12px">'+idx+'</td><td><strong>'+esc((u.first_name||'')+' '+(u.last_name||''))+'</strong></td><td style="font-family:\'DM Mono\',monospace;font-size:12px">'+esc(u.phone_number||'—')+'</td><td><div class="score-row"><div class="score-bar"><div class="score-fill" style="width:'+bar+'%;background:'+col+'"></div></div><span class="score-num">'+sc+'</span></div></td><td>'+statutBadge(u.statut)+'</td><td style="font-size:12px;color:var(--muted)">'+esc(u.region||'—')+'</td><td style="font-size:12px;color:var(--muted)">'+esc(u.province||'—')+'</td><td style="font-size:12px;color:var(--muted)">'+fmtYear(u.date_inscription)+'</td></tr>'}).join('')
  var inf=document.getElementById('tblInfo');if(inf)inf.textContent=total+' dossier'+(total>1?'s':'')+' — page '+currentPage+'/'+pages
  buildPagination('tblPag',pages,'credit')

function simField(label, content) {
  return '<div style="margin-bottom:16px"><label style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:7px">'+label+'</label>'+content+'</div>'
}

function toggleRatePanel() {
  var c = document.getElementById('ratePanelContent')
  var ch = document.getElementById('ratePanelChevron')
  if (!c) return
  var open = c.style.display !== 'none'
  c.style.display = open ? 'none' : 'block'
  ch.innerHTML = open ? '&#9660;' : '&#9650;'
}

function updateRate(id) {
  var inp = document.getElementById('rate_'+id)
  if (!inp) return
  var val = parseFloat(inp.value)
  if (isNaN(val)||val<0) val=0
  if (val > BCEAO_CAP) { inp.style.borderColor='var(--red)'; inp.style.color='var(--red)' } else { inp.style.borderColor=''; inp.style.color='' }
  TAUX_CUSTOM[id] = Math.min(val, BCEAO_CAP)
  calcSim()
}

function onSecteurChange() {
  var id = (document.getElementById('simSecteur')||{value:'mil'}).value
  var sec = SECTEURS.find(function(s){return s.id===id})||SECTEURS[0]
  var isAgri = sec.type === 'agri'
  document.getElementById('simFormAgri').style.display   = isAgri ? 'block' : 'none'
  document.getElementById('simFormNonAgri').style.display = isAgri ? 'none' : 'block'
  // Réinitialiser montant et marqueur manuel au changement de secteur

  if (mf) { mf.value = ''; mf.dataset.manual = '0' }
  // Défaut durée

  var dn = document.getElementById('simDuree');     if (dn) dn.value = sec.duree || 12

  if (info) {

      info.innerHTML = '<div class="info-banner" style="font-size:12px;margin-bottom:0">&#127807; <strong>Secteur agricole</strong> — Le modèle suggère un montant indicatif (score × surface). L'agent fixe librement le montant final. Taux actuel : <strong>'+TAUX_CUSTOM[id]+'% / an</strong></div>'
    } else {
      info.innerHTML = '<div style="background:#EEF4FF;border:1px solid #BBCEF8;border-radius:10px;padding:10px 14px;font-size:12px;color:#1a3a6e"><strong>&#127981; Activité non agricole</strong> — '+esc(sec.desc||'')+'<br>L'agent saisit librement le montant accordé. Plafond secteur : <strong>'+Number(sec.plafond).toLocaleString('fr-FR')+' FCFA</strong>. Taux actuel : <strong>'+TAUX_CUSTOM[id]+'% / an</strong></div>'
    }
  }
  calcSim()
}

// Calcul du TEG réel (taux effectif global annuel) par dichotomie sur la VAN
function computeTEG(principal, mensualite, duree) {
  if (!principal||!mensualite||!duree||mensualite<=0) return 0
  var lo=0.000001, hi=10, r
  for(var i=0;i<60;i++){
    r=(lo+hi)/2
    var pv = r>0 ? mensualite*(1-Math.pow(1+r,-duree))/r : mensualite*duree
    if(pv>principal) lo=r; else hi=r
  }
  return Math.round(r*12*10000)/100  // retourne % avec 2 décimales
}

function calcSim() {
  var secId   = (document.getElementById('simSecteur')||{value:'mil'}).value
  var sec     = SECTEURS.find(function(s){return s.id===secId})||SECTEURS[0]
  var isAgri  = sec.type === 'agri'
  var methode = (document.getElementById('simMethode')||{value:'degressif'}).value
  var histo   = parseFloat((document.getElementById('simHisto')||{value:1}).value)||1
  var regM    = parseFloat((document.getElementById('simRegion')||{value:1}).value)||1
  var taux    = Math.min(TAUX_CUSTOM[secId]||sec.taux, BCEAO_CAP)
  var rc      = document.getElementById('simResultContent')
  var pc      = document.getElementById('simPlanContent')
  if (!rc) return

  // Mise à jour info taux en temps réel
  var info = document.getElementById('simTypeInfo')
  if (info && isAgri) info.innerHTML = '<div class="info-banner" style="font-size:12px;margin-bottom:0">&#127807; <strong>Secteur agricole</strong> — Montant indicatif basé sur score × surface. L'agent fixe le montant final. Taux actuel : <strong>'+taux+'% / an</strong></div>'
  else if (info && !isAgri) info.innerHTML = '<div style="background:#EEF4FF;border:1px solid #BBCEF8;border-radius:10px;padding:10px 14px;font-size:12px;color:#1a3a6e"><strong>&#127981; Activité non agricole</strong> — '+esc(sec.desc||'')+'<br>Montant saisi librement par l'agent. Plafond : <strong>'+Number(sec.plafond).toLocaleString('fr-FR')+' FCFA</strong>. Taux actuel : <strong>'+taux+'% / an</strong></div>'

  var montant, duree, eligible=true, eligPartiel=false

  if (isAgri) {
    var score   = parseInt((document.getElementById('simScore')||{value:60}).value)||0
    var surface = parseFloat((document.getElementById('simSurface')||{value:2}).value)||1
    var sv = document.getElementById('simScoreVal'); if(sv) sv.textContent = score
    eligible    = score >= 61
    eligPartiel = score >= 41 && score < 61
    if (!eligible && !eligPartiel) {
      rc.innerHTML='<div style="background:#FDECEA;border-radius:10px;padding:16px"><strong style="color:#922B21">&#10060; Score insuffisant ('+score+'/100)</strong><br><span style="font-size:12px;color:#922B21;margin-top:6px;display:block">Score minimum requis : 41/100. Recommander un programme de renforcement avant réévaluation dans 6 mois.</span></div>'
      if(pc) pc.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">—</div>'
      return
    }
    // Montant indicatif (suggestion modèle)
    var scoreMulti = 0.4 + (score/100)*0.9
    var indicatif  = Math.round(sec.basePha * surface * scoreMulti * histo * regM / 5000)*5000
    // Afficher la suggestion
    var indDiv = document.getElementById('simMontantIndicatif')
    var indVal = document.getElementById('simIndVal')
    if (indDiv) indDiv.style.display = 'block'
    if (indVal) indVal.textContent   = Number(indicatif).toLocaleString('fr-FR')
    // Pré-remplir si l'agent n'a pas encore saisi manuellement
    var mfEl = document.getElementById('simMontantFinal')
    if (mfEl && (!mfEl.dataset.manual || mfEl.dataset.manual==='0')) mfEl.value = indicatif
    montant = Math.round((parseFloat(mfEl&&mfEl.value)||indicatif)/5000)*5000
    duree   = Math.max(1, Math.min(parseInt((document.getElementById('simDureeAgri')||{value:sec.duree}).value)||sec.duree, 60))
  } else {
    montant = Math.round((parseFloat((document.getElementById('simMontant')||{value:500000}).value)||500000)/5000)*5000
    duree   = Math.max(1, Math.min(parseInt((document.getElementById('simDuree')||{value:12}).value)||12, 60))
  }

  if (!montant || montant <= 0) {
    rc.innerHTML='<div style="background:#FFF3E0;border-radius:10px;padding:14px;font-size:13px;color:#7D4E00">&#9888; Saisir un montant accordé pour lancer la simulation.</div>'
    if(pc) pc.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">—</div>'
    return
  }

  var tauxM = taux/12/100
  var mensualite, totalR, interets, teg

  if (methode === 'flat') {
    // Intérêts calculés sur le capital initial (méthode terrain BF)
    var intTotal = Math.round(montant * (taux/100) * (duree/12))
    totalR     = montant + intTotal
    mensualite = Math.round(totalR / duree / 100) * 100
    interets   = mensualite * duree - montant
    teg        = computeTEG(montant, mensualite, duree)
  } else {
    // Dégressif PMT (BCEAO)
    mensualite = tauxM>0
      ? Math.round(montant*tauxM*Math.pow(1+tauxM,duree)/(Math.pow(1+tauxM,duree)-1)/100)*100
      : Math.round(montant/duree/100)*100
    totalR   = mensualite*duree
    interets = totalR-montant
    teg      = taux
  }

  // Badge méthode
  var methodeBadge = methode==='flat'
    ? '<span style="background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700">FLAT</span>'
    : '<span style="background:#E8F5E9;color:#1B5E20;border:1px solid #A5D6A7;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700">DÉGRESSIF</span>'

  // Alerte TEG pour méthode flat
  var tegHtml = ''
  if (methode==='flat' && teg>0) {
    var overCap = teg > BCEAO_CAP
    tegHtml = '<div style="background:'+(overCap?'#FDECEA':'#FFF8E1')+';border:1px solid '+(overCap?'#F5C6C6':'#FFD54F')+';border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:'+(overCap?'#922B21':'#7D6608')+'">'
      + (overCap?'&#9888;&#65039; <strong>TEG réel : '+teg+'% / an — DÉPASSE LE PLAFOND BCEAO (24%)</strong>':'&#8505;&#65039; TEG réel : <strong>'+teg+'% / an</strong> — supérieur au taux nominal ('+taux+'%) en méthode flat')
      + '</div>'
  }

  var statusHtml = ''
  if (isAgri) {
    statusHtml = eligible
      ? '<div style="background:#E8F5E9;border-radius:10px;padding:10px 14px;margin-bottom:14px"><strong style="color:#1B5E20">&#9989; ÉLIGIBLE — score '+(document.getElementById('simScore')||{value:60}).value+'/100</strong></div>'
      : '<div style="background:#FFF8E1;border-radius:10px;padding:10px 14px;margin-bottom:14px"><strong style="color:#7D6608">&#9888; ÉLIGIBLE PARTIEL — accord conditionnel</strong><br><span style="font-size:11px;color:#7D6608">Suivi renforcé recommandé — montant à valider</span></div>'
  } else {
    statusHtml = '<div style="background:#E3F2FD;border-radius:10px;padding:10px 14px;margin-bottom:14px"><strong style="color:#0D47A1">&#128309; ANALYSE COMPLÉTÉE — montant saisi par l'agent</strong></div>'
  }

  rc.innerHTML = statusHtml + tegHtml
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
    + '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:5px">Montant accordé</div><div class="sim-montant">'+Number(montant).toLocaleString('fr-FR')+'</div><div style="font-size:10px;color:var(--muted);margin-top:4px">FCFA — '+duree+' mois</div></div>'
    + '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:5px">Mensualité</div><div class="sim-mensualite">'+Number(mensualite).toLocaleString('fr-FR')+'</div><div style="font-size:10px;color:var(--muted);margin-top:4px">FCFA / mois</div></div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;text-align:center;padding-top:12px;border-top:1px solid var(--border)">'
    + '<div><div style="font-size:10px;color:var(--muted)">Total remboursé</div><div style="font-weight:700;font-family:'DM Mono',monospace;font-size:12px">'+Number(totalR).toLocaleString('fr-FR')+' F</div></div>'
    + '<div><div style="font-size:10px;color:var(--muted)">Coût crédit</div><div style="font-weight:700;font-family:'DM Mono',monospace;font-size:12px;color:var(--amber)">'+Number(interets).toLocaleString('fr-FR')+' F</div></div>'
    + '<div><div style="font-size:10px;color:var(--muted)">Taux nominal</div><div style="font-weight:700;font-family:'DM Mono',monospace;font-size:12px;color:var(--vert)">'+taux+'% / an</div></div>'
    + '<div><div style="font-size:10px;color:var(--muted)">Méthode</div><div style="margin-top:3px">'+methodeBadge+'</div></div>'
    + '</div>'

  // Échéancier
  var now=new Date(), solde=montant, rows=''
  var showMonths=Math.min(duree,10)
  var intFlatM = methode==='flat' ? Math.round(montant*tauxM) : 0
  for(var m=0;m<showMonths;m++){
    var dm=new Date(now.getFullYear(),now.getMonth()+m+1,1)
    var intM, capM
    if (methode==='flat') {
      intM = intFlatM   // constant sur capital initial
      capM = mensualite - intM
    } else {
      intM = Math.round(solde*tauxM)
      capM = mensualite-intM
    }
    solde=Math.max(0,solde-capM)
    rows+='<tr><td style="padding:6px 10px;font-size:11px;border-top:1px solid #f0f4f0;color:var(--muted)">'+dm.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})+'</td>'
      +'<td style="padding:6px 10px;font-size:11px;font-family:'DM Mono',monospace;text-align:right;border-top:1px solid #f0f4f0">'+Number(mensualite).toLocaleString('fr-FR')+'</td>'
      +'<td style="padding:6px 10px;font-size:11px;text-align:right;color:var(--amber);font-family:'DM Mono',monospace;border-top:1px solid #f0f4f0">'+Number(intM).toLocaleString('fr-FR')+'</td>'
      +'<td style="padding:6px 10px;font-size:11px;text-align:right;color:var(--muted);font-family:'DM Mono',monospace;border-top:1px solid #f0f4f0">'+Number(Math.round(solde/1000)*1000).toLocaleString('fr-FR')+'</td></tr>'
  }
  if(duree>showMonths) rows+='<tr><td colspan="4" style="padding:6px 10px;text-align:center;font-size:11px;color:var(--muted);border-top:1px solid #f0f4f0">… '+(duree-showMonths)+' mois supplémentaires</td></tr>'
  var thInt = methode==='flat' ? 'Intérêts (capital initial)' : 'Intérêts (solde restant)'
  if(pc) pc.innerHTML='<table style="width:100%;border-collapse:collapse"><thead><tr>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:left">Mois</th>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:right">Mensualité (FCFA)</th>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:right">'+thInt+'</th>'
    +'<th style="background:var(--vert-bg);font-size:10px;color:var(--muted);padding:7px 10px;text-align:right">Solde restant</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>'
}


// ── PAGINATION ────────────────────────────────────────────────────────────────
function buildPagination(cid,pages,ctx) {
  var pag=document.getElementById(cid);if(!pag)return;pag.innerHTML=''
  if(currentPage>1)addPageBtn(pag,'‹',currentPage-1,false,ctx)
  for(var p=Math.max(1,currentPage-2);p<=Math.min(pages,currentPage+2);p++)addPageBtn(pag,p,p,p===currentPage,ctx)
  if(currentPage<pages)addPageBtn(pag,'›',currentPage+1,false,ctx)
}
function addPageBtn(container,label,page,active,ctx) {
  var b=document.createElement('button');b.className='page-btn'+(active?' active':'');b.textContent=label
  var p=page;b.onclick=function(){currentPage=p;renderCreditTable()}
  if(active)b.disabled=true;container.appendChild(b)
}

// ── LOGOUT ────────────────────────────────────────────────────────────────────
function logout() {
  sessionStorage.removeItem('mfi_token');sessionStorage.removeItem('mfi_user')
  TOKEN=null;USER=null;DATA=null;killCharts()
  document.getElementById('loginScreen').style.display='flex'
  document.getElementById('app').style.display='none'
  document.getElementById('username').value='';document.getElementById('password').value=''
  document.getElementById('loginError').textContent=''
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtN(n)      { return n!=null?Number(n).toLocaleString('fr-FR'):'—' }
function fmtDate(iso) { return iso?new Date(iso).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}):'—' }
function fmtYear(iso) { return iso?new Date(iso).getFullYear():'—' }
function esc(s)       { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function kpiCard(cls,icon,val,label,suffix) {
  var display=(val===null||val===undefined||val===''||val===0&&label.includes('Score'))?'—':fmtN(val)+(suffix||'')
  if(val===0&&!label.includes('Score'))display='0'
  return '<div class="kpi-card '+(cls||'')+'"><div class="kpi-icon">'+icon+'</div><div class="kpi-value">'+display+'</div><div class="kpi-label">'+label+'</div></div>'
}
function statutBadge(s) { var m={'\xc9ligible cr\xe9dit':'b-green','\xc0 \xe9valuer':'b-amber','Insuffisant':'b-red'}; return '<span class="badge '+(m[s]||'b-gray')+'">'+esc(s||'Non \xe9valu\xe9')+'</span>' }
</script>
